<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order summary component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stlye.css">
</head>
<body>
    <main>

        <div class="card-container">
            <div class="card-image"><img src="images/illustration-hero.svg" alt=""></div>
            <div class="order-title"><h1>Order Summary</h1></div>
            <p class="order-info">You can now listen to millions of song, audiobooks, and podcast on any device anywhere you like!</p>
            <div class="plan-card">
                <div class="plan-left">
                    <img src="images/icon-music.svg" alt="">
                    <div class="plan-text">
                        <h2>Annual Plan</h2>
                        <p>$59.99/year</p>
                    </div>
                    
                </div>
                <a href="#" class="change-link">Change</a>

                </div>
            <button class="proceed-brn">Proceed to Payment</button>
            <p class="cancel-order">Cancel Order</p>
        
        </div>




    </main>
</body>
</html>
